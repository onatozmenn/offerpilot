name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  documentation:
    name: Documentation and Compose
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Validate documentation contracts
        shell: pwsh
        run: ./scripts/validate-docs.ps1
      - name: Validate Compose model
        run: docker compose config --quiet

  go-test:
    name: Go tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: 1.26.5
          cache: true
          cache-dependency-path: go.sum
      - name: Verify modules
        run: go mod verify
      - name: Check formatting
        shell: bash
        run: |
          unformatted="$(gofmt -l .)"
          if [[ -n "$unformatted" ]]; then
            printf 'Unformatted Go files:\n%s\n' "$unformatted"
            exit 1
          fi
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -count=1 ./...
      - name: Race test
        run: go test -race -count=1 ./...

  go-lint:
    name: Go lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: 1.26.5
          cache: true
          cache-dependency-path: go.sum
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: --timeout=5m

  go-security:
    name: Go vulnerability scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Run govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: 1.26.5
          go-package: ./...
          repo-checkout: false
          cache: true
          cache-dependency-path: go.sum

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: web
    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22.16.0
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Audit dependencies
        run: npm audit --audit-level=high
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm run test
      - name: Build
        run: npm run build

  containers:
    name: Container builds
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Validate Compose model
        run: docker compose config --quiet
      - name: Build API image
        run: docker build --tag offerpilot-api:ci .
      - name: Build web image
        run: docker build --tag offerpilot-web:ci web