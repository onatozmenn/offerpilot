    SimulationRun:
      type: object
      additionalProperties: false
      required:
        - run_id
        - experiment_id
        - seed
        - requests_per_second
        - max_decisions
        - status
        - decision_count
        - outcome_count
        - error_count
        - observed_reward_sum
        - random_expected_reward_sum
        - oracle_expected_reward_sum
        - started_at
        - stopped_at
        - updated_at
        - error_code
        - error_detail
      properties:
        run_id:
          $ref: "#/components/schemas/UUID"
        experiment_id:
          $ref: "#/components/schemas/UUID"
        seed:
          type: integer
          format: int64
        requests_per_second:
          type: integer
          minimum: 1
          maximum: 100
        max_decisions:
          type: integer
          minimum: 1
          maximum: 100000
        status:
          $ref: "#/components/schemas/SimulationRunStatus"
        decision_count:
          type: integer
          format: int64
          minimum: 0
        outcome_count:
          type: integer
          format: int64
          minimum: 0
        error_count:
          type: integer
          format: int64
          minimum: 0
        observed_reward_sum:
          type: number
          format: double
          minimum: 0
        random_expected_reward_sum:
          type: number
          format: double
          minimum: 0
        oracle_expected_reward_sum:
          type: number
          format: double
          minimum: 0
        started_at:
          $ref: "#/components/schemas/Timestamp"
        stopped_at:
          anyOf:
            - $ref: "#/components/schemas/Timestamp"
            - type: "null"
        updated_at:
          $ref: "#/components/schemas/Timestamp"
        error_code:
          type: [string, "null"]
        error_detail:
          type: [string, "null"]
    CreateDemoExperimentRequest:
      oneOf:
        - type: object
          additionalProperties: false
          required: [name, policy_kind]
          properties:
            name:
              type: string
              minLength: 1
              maxLength: 200
            policy_kind:
              const: random
        - type: object
          additionalProperties: false
          required: [name, policy_kind, epsilon]
          properties:
            name:
              type: string
              minLength: 1
              maxLength: 200
            policy_kind:
              const: segmented_epsilon_greedy
            epsilon:
              type: number
              minimum: 0
              maximum: 1
    CreateDecisionRequest:
      type: object
      additionalProperties: false
      required: [experiment_id, context]
      properties:
        experiment_id:
          $ref: "#/components/schemas/UUID"
        context:
          $ref: "#/components/schemas/SessionContext"
    CreateOutcomeRequest:
      type: object
      additionalProperties: false
      required: [event_id, decision_id, outcome, occurred_at]
      properties:
        event_id:
          $ref: "#/components/schemas/UUID"
        decision_id:
          $ref: "#/components/schemas/UUID"
        outcome:
          $ref: "#/components/schemas/OutcomeKind"
        occurred_at:
          $ref: "#/components/schemas/Timestamp"
    CreateSimulationRunRequest:
      type: object
      additionalProperties: false
      required: [seed, requests_per_second, max_decisions]
      properties:
        seed:
          type: integer
          format: int64
        requests_per_second:
          type: integer
          minimum: 1
          maximum: 100
        max_decisions:
          type: integer
          minimum: 1
          maximum: 100000
    Problem:
      type: object
      additionalProperties: false
      required: [type, title, status, code, detail, request_id]
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
          minLength: 1
        status:
          type: integer
          minimum: 400
          maximum: 599
        code:
          type: string
          enum:
            - malformed_json
            - unknown_field
            - multiple_json_values
            - missing_field
            - invalid_enum
            - invalid_uuid
            - invalid_timestamp
            - invalid_context
            - invalid_query
            - unsupported_media_type
            - request_too_large
            - not_found
            - experiment_not_running
            - insufficient_offers
            - outcome_already_recorded
            - simulation_already_running
            - policy_unhealthy
            - database_unavailable
            - request_timeout
            - internal_error
        detail:
          type: string
          minLength: 1
        request_id:
          type: string
          minLength: 1