version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - bodyclose
    - contextcheck
    - errcheck
    - govet
    - ineffassign
    - sqlclosecheck
    - staticcheck
    - unconvert
  exclusions:
    generated: strict
    paths:
      - ^web/node_modules/
      - ^web/dist/
      - ^web/coverage/